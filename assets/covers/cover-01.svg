<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#0E1630"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="18%" r="60%">
      <stop offset="0" stop-color="#7C4DFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="30%" r="55%">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#29F5A6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <!-- grid -->
  <g opacity="0.16" stroke="#78B4FF" stroke-width="1">
    <path d="M0 720 H1600"/>
    <path d="M0 540 H1600"/>
    <path d="M0 360 H1600"/>
    <path d="M0 180 H1600"/>
    <path d="M200 0 V900"/>
    <path d="M400 0 V900"/>
    <path d="M600 0 V900"/>
    <path d="M800 0 V900"/>
    <path d="M1000 0 V900"/>
    <path d="M1200 0 V900"/>
    <path d="M1400 0 V900"/>
  </g>

  <!-- card -->
  <g filter="url(#soft)">
    <rect x="120" y="190" width="1360" height="520" rx="28" fill="rgba(14,22,48,0.68)" stroke="url(#stroke)" stroke-width="2"/>
  </g>

  <!-- title -->
  <text x="190" y="330" fill="#D7E1FF" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto" font-size="54" font-weight="800" letter-spacing="0.5">
    AI / Agentic Engineering
  </text>
  <text x="190" y="392" fill="#96A6D6" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto" font-size="26" font-weight="500">
    Cyber Dark Cover • 1600×900
  </text>

  <!-- accents -->
  <g>
    <path d="M190 450 H640" stroke="url(#stroke)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <circle cx="1295" cy="320" r="8" fill="#00E5FF"/>
    <circle cx="1325" cy="320" r="8" fill="#7C4DFF"/>
    <circle cx="1355" cy="320" r="8" fill="#29F5A6"/>
  </g>

  <!-- footer -->
  <text x="190" y="660" fill="#96A6D6" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas" font-size="18">
    blog.201310.xyz
  </text>
</svg>
