<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="20%" cy="25%" r="90%">
      <stop offset="0" stop-color="#1b1238" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#070a12"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb020"/>
      <stop offset="0.55" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.14)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.55"/>

  <!-- diagonal accent -->
  <path d="M-100 520 L320 120 L520 120 L100 520 Z" fill="url(#acc)" opacity="0.75"/>
  <path d="M760 680 L1040 300 L1280 300 L980 680 Z" fill="url(#acc)" opacity="0.55"/>

  <!-- main card -->
  <g filter="url(#shadow)">
    <rect x="90" y="140" width="1020" height="300" rx="22" fill="rgba(14,22,48,0.72)" stroke="rgba(255,176,32,0.22)"/>
    <text x="140" y="240" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="54" font-weight="800" fill="#F6F0FF">
      OpenClaw Skills
    </text>
    <text x="140" y="305" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="500" fill="rgba(246,240,255,0.78)">
      Real-world playbooks & automation
    </text>

    <rect x="140" y="345" width="260" height="52" rx="14" fill="rgba(255,176,32,0.10)" stroke="rgba(255,176,32,0.35)"/>
    <text x="168" y="380" font-family="JetBrains Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace" font-size="20" fill="#FFB020">
      cover-03.svg
    </text>
  </g>
</svg>
