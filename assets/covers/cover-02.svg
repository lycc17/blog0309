<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#132a6b"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- accent arcs -->
  <g opacity="0.9" filter="url(#glow)">
    <path d="M-50,520 C220,340 380,340 650,520" fill="none" stroke="url(#acc)" stroke-width="10"/>
    <path d="M550,120 C780,40 980,70 1250,220" fill="none" stroke="url(#acc)" stroke-width="8" opacity="0.7"/>
  </g>

  <!-- title block -->
  <g>
    <rect x="80" y="90" width="1040" height="200" rx="18" fill="rgba(14,22,48,0.55)" stroke="rgba(120,180,255,0.20)"/>
    <text x="120" y="170" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="52" font-weight="700" fill="#EAF1FF">
      Workflow / Agents
    </text>
    <text x="120" y="230" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="500" fill="rgba(234,241,255,0.78)">
      Practical notes · build, debug, ship
    </text>
  </g>

  <!-- footer -->
  <g opacity="0.9">
    <rect x="80" y="510" width="360" height="56" rx="14" fill="rgba(0,0,0,0.28)" stroke="rgba(0,229,255,0.25)"/>
    <text x="110" y="548" font-family="JetBrains Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace" font-size="20" fill="#96A6D6">
      cover-02.svg
    </text>
  </g>
</svg>
