<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="糖果的博客 favicon">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C4DFF"/>
      <stop offset="0.55" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#29F5A6"/>
    </linearGradient>
    <clipPath id="candyClip">
      <circle cx="32" cy="32" r="16"/>
    </clipPath>
  </defs>

  <!-- background chip -->
  <rect x="8" y="8" width="48" height="48" rx="18" fill="#070A12"/>
  <rect x="8" y="8" width="48" height="48" rx="18" fill="url(#neon)" opacity="0.12"/>

  <!-- candy disc -->
  <circle cx="32" cy="32" r="17" fill="#070A12" opacity="0.55"/>
  <circle cx="32" cy="32" r="16" fill="url(#neon)" opacity="0.95"/>

  <!-- diagonal stripes -->
  <g clip-path="url(#candyClip)" opacity="0.50">
    <rect x="-10" y="18" width="120" height="5" rx="2.5" fill="#070A12" transform="rotate(-25 32 32)"/>
    <rect x="-10" y="30" width="120" height="5" rx="2.5" fill="#070A12" transform="rotate(-25 32 32)"/>
    <rect x="-10" y="42" width="120" height="5" rx="2.5" fill="#070A12" transform="rotate(-25 32 32)"/>
  </g>

  <!-- outline & gloss -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#D7E1FF" stroke-opacity="0.18" stroke-width="2"/>
  <ellipse cx="26" cy="26" rx="10" ry="7" fill="#FFFFFF" opacity="0.16"/>
  <circle cx="43" cy="43" r="3" fill="#00E5FF" opacity="0.9"/>
</svg>
